services:
  postgres:
    image: postgres:15
    container_name: ecapstone_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGREs_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
